<svg width="100%" viewBox="0 0 680 680" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="starLeft">
      <polygon points="340,60 340,680 0,680 0,0"/>
    </clipPath>
    <clipPath id="starRight">
      <polygon points="340,60 340,680 680,680 680,0"/>
    </clipPath>
    <clipPath id="starShape">
      <polygon points="340,60 405,250 610,250 450,370 510,560 340,440 170,560 230,370 70,250 275,250"/>
    </clipPath>
    <linearGradient id="blueGrad" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#55aaff"/>
      <stop offset="50%" stop-color="#1166dd"/>
      <stop offset="100%" stop-color="#003399"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#44dd88"/>
      <stop offset="50%" stop-color="#22aa44"/>
      <stop offset="100%" stop-color="#116622"/>
    </linearGradient>
  </defs>

  <!-- Blue left half -->
  <g clip-path="url(#starShape)" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
    <rect x="60" y="60" width="280" height="520" fill="url(#blueGrad)" style="stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <!-- blue inner detail — subtle rays -->
    <line x1="340" y1="60" x2="70" y2="250" stroke="#aaddff" stroke-width="1" opacity="0.25" style="fill:rgb(0, 0, 0);stroke:rgb(170, 221, 255);color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.25;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <line x1="340" y1="60" x2="230" y2="370" stroke="#aaddff" stroke-width="1" opacity="0.2" style="fill:rgb(0, 0, 0);stroke:rgb(170, 221, 255);color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.2;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <line x1="340" y1="60" x2="170" y2="560" stroke="#aaddff" stroke-width="1" opacity="0.18" style="fill:rgb(0, 0, 0);stroke:rgb(170, 221, 255);color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.18;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <line x1="340" y1="60" x2="340" y2="440" stroke="#aaddff" stroke-width="1" opacity="0.15" style="fill:rgb(0, 0, 0);stroke:rgb(170, 221, 255);color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.15;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <!-- blue sheen -->
    <ellipse cx="240" cy="260" rx="120" ry="80" fill="#88ccff" opacity="0.12" transform="rotate(-20,240,260)" style="fill:rgb(136, 204, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.12;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <ellipse cx="210" cy="420" rx="90" ry="60" fill="#88ccff" opacity="0.1" transform="rotate(15,210,420)" style="fill:rgb(136, 204, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  </g>

  <!-- Green right half -->
  <g clip-path="url(#starShape)" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
    <rect x="340" y="60" width="280" height="520" fill="url(#greenGrad)" style="stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <!-- green inner detail — subtle rays -->
    <line x1="340" y1="60" x2="610" y2="250" stroke="#aaffcc" stroke-width="1" opacity="0.25" style="fill:rgb(0, 0, 0);stroke:rgb(170, 255, 204);color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.25;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <line x1="340" y1="60" x2="450" y2="370" stroke="#aaffcc" stroke-width="1" opacity="0.2" style="fill:rgb(0, 0, 0);stroke:rgb(170, 255, 204);color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.2;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <line x1="340" y1="60" x2="510" y2="560" stroke="#aaffcc" stroke-width="1" opacity="0.18" style="fill:rgb(0, 0, 0);stroke:rgb(170, 255, 204);color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.18;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <line x1="340" y1="60" x2="340" y2="440" stroke="#aaffcc" stroke-width="1" opacity="0.15" style="fill:rgb(0, 0, 0);stroke:rgb(170, 255, 204);color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.15;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <!-- green sheen -->
