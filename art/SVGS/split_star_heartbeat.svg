  </g>

  <!-- ===== HEART MONITOR LINE — only on red left half ===== -->
  <!-- line runs horizontally across the red half at y=310 (vertical center of star) -->
  <!-- starts flat from left edge, then does the spike pattern, then flat again -->
  <!-- clipped to star shape AND left half only -->
  <g clip-path="url(#starLeft)" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
    <g clip-path="url(#starShape)" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
      <!-- flat lead-in from left -->
      <!-- ECG path: flat → small dip → big up spike → big down spike → small bump → flat -->
      <!-- Centered vertically at y=310, traversing left half x=100 to x=340 -->
      <polyline points="&#10;          100,310&#10;          158,310&#10;          168,310&#10;          174,318&#10;          180,310&#10;          186,300&#10;          192,310&#10;          198,252&#10;          206,370&#10;          214,310&#10;          222,322&#10;          228,310&#10;          240,310&#10;          340,310&#10;        " fill="none" stroke="#ffffff" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" opacity="0.95" style="fill:none;stroke:rgb(255, 255, 255);color:rgb(255, 255, 255);stroke-width:2.8px;stroke-linecap:round;stroke-linejoin:round;opacity:0.95;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
      <!-- same line in red for depth -->
      <polyline points="&#10;          100,310&#10;          158,310&#10;          168,310&#10;          174,318&#10;          180,310&#10;          186,300&#10;          192,310&#10;          198,252&#10;          206,370&#10;          214,310&#10;          222,322&#10;          228,310&#10;          240,310&#10;          340,310&#10;        " fill="none" stroke="#ff2222" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.5" style="fill:none;stroke:rgb(255, 34, 34);color:rgb(255, 255, 255);stroke-width:1.2px;stroke-linecap:round;stroke-linejoin:round;opacity:0.5;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
